version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: easy1auth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: easy1auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - easy1auth-network

  redis:
    image: redis:7-alpine
    container_name: easy1auth-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - easy1auth-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: easy1auth-backend
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/easy1auth?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - easy1auth-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: easy1auth-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:3000/api
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - easy1auth-network
    command: npm run dev -- --host

volumes:
  postgres_data:
  redis_data:

networks:
  easy1auth-network:
    driver: bridge
